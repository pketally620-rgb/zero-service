<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZERO職人鍍膜_XPEL竹北授權店 | 尊榮入口大廳</title>
<style>
:root {
    --bg-base: #0a0b10;
    --bg-card: #151720;
    --border-metal: #2a2d3d;
    --border-light: rgba(255, 255, 255, 0.08);
    --gold-gradient: linear-gradient(135deg, #c59b27 0%, #fcf6ba 40%, #c59b27 80%, #aa771c 100%);
    --gold-solid: #d4af37;
    --gold-dim: rgba(212, 175, 55, 0.15);
    --text-main: #f1f5f9;
    --text-muted: #94a3b8;
}

body { 
    font-family: 'Helvetica Neue', 'Segoe UI', Tahoma, Geneva, sans-serif; 
    background: radial-gradient(ellipse at top, #1a1d2b 0%, var(--bg-base) 80%);
    color: var(--text-main); 
    margin: 0; 
    display: flex; 
    justify-content: center; 
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

.lobby-container {
    text-align: center;
    background: linear-gradient(145deg, var(--bg-card), #10121a);
    padding: 60px 40px; border-radius: 20px; 
    border: 1px solid var(--border-light);
    box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
    max-width: 800px;
    width: 90%;
    position: relative;
}

.text-metallic {
    background: var(--gold-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0px 2px 10px rgba(197, 155, 39, 0.2);
}

.brand-title { margin-top: 0; font-size: 36px; font-weight: 800; letter-spacing: 2px; margin-bottom: 10px; }
.brand-subtitle { font-size: 18px; color: var(--text-muted); font-weight: normal; letter-spacing: 3px; margin-bottom: 40px; display: block; }

.entry-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }

.entry-btn {
    width: 100%; padding: 25px;
    background: #13151d; border: 1px solid var(--border-metal);
    color: var(--gold-solid); border-radius: 12px;
    font-size: 18px; font-weight: 900; letter-spacing: 1px;
    cursor: pointer; transition: all 0.3s;
    box-shadow: 5px 5px 15px #0a0b0f, -5px -5px 15px #1c1f2b;
    display: flex; align-items: center; justify-content: center;
}
.entry-btn:hover {
    border-color: var(--gold-solid);
    box-shadow: 0 10px 25px rgba(0,0,0,0.8), inset 0 0 10px rgba(197, 155, 39, 0.1);
    transform: translateY(-3px);
}
.entry-btn span { margin-left: 10px; }

@media (max-width: 600px) { .entry-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="lobby-container">
  <h1 class="brand-title text-metallic">ZERO職人鍍膜_XPEL竹北授權店</h1>
  <span class="brand-subtitle">全方位車體防護 尊榮入口大廳</span>
  <div class="entry-grid">
    <button type="button" class="entry-btn" onclick="location.href='quote/index.html'">
      ⚙️ <span>智慧報價系統</span>
    </button>
    <button type="button" class="entry-btn" onclick="location.href='warranty/index.html'">
      ✦ <span>保固卡查詢</span>
    </button>
  </div>
</div>
</body>
</html>
