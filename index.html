<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZERO職人鍍膜_XPEL竹北授權店 | 尊榮入口大廳</title>
<style>
  :root {
    --bg-base: #0a0b10;
    --bg-card: #151720;
    --gold-gradient: linear-gradient(135deg, #c59b27 0%, #fcf6ba 40%, #c59b27 80%, #aa771c 100%);
    --gold-solid: #d4af37;
    --text-main: #f1f5f9;
    --text-muted: #94a3b8;
    --border-metal: #2a2d3d;
  }

  body { 
    font-family: 'Helvetica Neue', 'Segoe UI', Tahoma, Geneva, sans-serif; 
    background: radial-gradient(ellipse at top, #1a1d2b 0%, var(--bg-base) 80%);
    color: var(--text-main); 
    margin: 0; 
    padding: 0; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh;
  }

  .lobby-container {
    width: 100%;
    max-width: 550px;
    padding: 20px;
    box-sizing: border-box;
  }

  .lobby-card {
    background: linear-gradient(145deg, var(--bg-card), #10121a);
    padding: 45px 35px;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.02);
    text-align: center;
  }

  .brand-logo {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 2px;
    background: var(--gold-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    margin-top: 0;
  }

  .brand-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: 4px;
    margin-bottom: 40px;
  }

  .button-group {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .btn-lobby {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 16px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    text-decoration: none;
    transition: all 0.3s ease;
    box-sizing: border-box;
  }

  /* 智慧報價系統樣式 */
  .btn-quote {
    background: #1e293b;
    color: var(--text-main);
    border: 1px solid var(--border-metal);
  }
  .btn-quote:hover {
    background: #334155;
    border-color: var(--text-muted);
    transform: translateY(-2px);
  }

  /* 電子保固查詢樣式 */
  .btn-search {
    background: var(--gold-gradient);
    color: #10121a;
    border: none;
    box-shadow: 0 4px 15px rgba(197, 155, 39, 0.2);
  }
  .btn-search:hover {
    filter: brightness(1.15);
    box-shadow: 0 6px 20px rgba(197, 155, 39, 0.3);
    transform: translateY(-2px);
  }

  /* 保固條款須知樣式 */
  .btn-warranty {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid rgba(255, 255, 255, 0.1);
    font-size: 14px;
    padding: 12px;
  }
  .btn-warranty:hover {
    color: var(--text-main);
    border-color: var(--text-muted);
    background: rgba(255, 255, 255, 0.02);
  }

  .footer-text {
    margin-top: 35px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.2);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="lobby-container">
  <div class="lobby-card">
    <h1 class="brand-logo">ZERO職人鍍膜_XPEL竹北授權店</h1>
    <div class="brand-subtitle">全方位車體防護 尊榮入口大廳</div>
    
    <div class="button-group">
      <a href="./quote/index.html" class="btn-lobby btn-quote">⚙️ 智慧報價系統</a>
      
      <a href="./search/index.html" class="btn-lobby btn-search">🔍 鍍膜保固查詢</a>
      
      <a href="./warranty/index.html" class="btn-lobby btn-warranty">📖 保固條款須知</a>
    </div>

    <div class="footer-text">© ZERO PROFESSIONAL DETAILING CENTER</div>
  </div>
</div>

</body>
</html>
