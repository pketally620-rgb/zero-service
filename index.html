<style>
  :root {
    --gold-gradient: linear-gradient(135deg, #c59b27 0%, #fcf6ba 40%, #c59b27 80%, #aa771c 100%);
    --bg-base: #0a0b10;
  }
  
  body { 
    margin: 0; padding: 0; 
    font-family: 'Helvetica Neue', 'Segoe UI', Tahoma, Geneva, sans-serif; 
    background: radial-gradient(ellipse at top, #1a1d2b 0%, var(--bg-base) 80%);
    color: #fff; 
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }

  /* 毛玻璃質感卡片 */
  .lobby-card { 
    background: rgba(21, 23, 32, 0.6); 
    backdrop-filter: blur(12px); 
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08); 
    border-radius: 24px; 
    padding: 50px 40px; 
    text-align: center; 
    max-width: 420px; 
    width: 90%; 
    box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05); 
  }

  .logo { 
    font-size: 26px; font-weight: 900; 
    background: var(--gold-gradient); 
    -webkit-background-clip: text; 
    -webkit-text-fill-color: transparent; 
    margin-bottom: 8px; letter-spacing: 1px;
    text-shadow: 0px 2px 10px rgba(197, 155, 39, 0.2);
  }
  
  .subtitle { color: #94a3b8; font-size: 14px; letter-spacing: 3px; margin-bottom: 40px; }
  
  /* 主按鈕樣式 */
  .btn-main { 
    display: block; width: 100%; padding: 18px; margin-bottom: 18px; 
    border-radius: 12px; text-decoration: none; font-size: 16px; font-weight: bold; 
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-sizing: border-box; 
    letter-spacing: 1px;
  }
  
  .btn-quote { 
    background: linear-gradient(145deg, #1e293b, #0f172a); 
    color: #f1f5f9; border: 1px solid #334155; 
  }
  .btn-quote:hover { border-color: #cbd5e1; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
  
  .btn-warranty { 
    background: var(--gold-gradient); color: #1a1500; 
    box-shadow: 0 8px 20px rgba(212, 175, 55, 0.25); border: none;
  }
  .btn-warranty:hover { filter: brightness(1.15); transform: translateY(-2px); box-shadow: 0 12px 25px rgba(212, 175, 55, 0.4); }
  
  .btn-rules { background: transparent; color: #94a3b8; border: 1px dashed #334155; margin-bottom: 0; }
  .btn-rules:hover { color: #fff; border-color: #94a3b8; background: rgba(255,255,255,0.02); }

  /* 社群聯絡按鈕區 */
  .social-container { 
    display: flex; justify-content: center; gap: 20px; 
    margin-top: 35px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px; 
  }
  
  .social-btn { 
    display: flex; align-items: center; justify-content: center; 
    width: 48px; height: 48px; border-radius: 50%; 
    background: #1e293b; color: #fff; text-decoration: none; 
    transition: all 0.3s; border: 1px solid #334155;
  }
  
  .social-btn svg { width: 22px; height: 22px; fill: currentColor; }
  
  /* 懸停品牌色特效 */
  .s-line:hover { background: #06C755; border-color: #06C755; transform: translateY(-4px); box-shadow: 0 10px 15px rgba(6, 199, 85, 0.3); }
  .s-fb:hover { background: #1877F2; border-color: #1877F2; transform: translateY(-4px); box-shadow: 0 10px 15px rgba(24, 119, 242, 0.3); }
  .s-ig:hover { background: #E4405F; border-color: #E4405F; transform: translateY(-4px); box-shadow: 0 10px 15px rgba(228, 64, 95, 0.3); }
  .s-map:hover { background: #EA4335; border-color: #EA4335; transform: translateY(-4px); box-shadow: 0 10px 15px rgba(234, 67, 53, 0.3); }
  
  .footer-text { margin-top: 35px; font-size: 11px; color: #475569; letter-spacing: 1px; }
</style>
