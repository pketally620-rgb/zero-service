<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZERO職人鍍膜_XPEL竹北授權店 | 智慧報價系統</title>
<style>
  :root {
    --bg-base: #0a0b10; --bg-card: #151720; --bg-input: #0f1118;
    --gold-gradient: linear-gradient(135deg, #c59b27 0%, #fcf6ba 40%, #c59b27 80%, #aa771c 100%);
    --gold-solid: #d4af37; --gold-dim: rgba(212, 175, 55, 0.15);
    --vip-gradient: linear-gradient(135deg, #ea580c 0%, #fb923c 50%, #ea580c 100%);
    --vip-solid: #f97316;
    --text-main: #f1f5f9; --text-muted: #94a3b8;
    --border-metal: #2a2d3d; --border-light: rgba(255, 255, 255, 0.08);
    --success: #10b981;
  }
  body { font-family: 'Helvetica Neue', 'Segoe UI', Tahoma, Geneva, sans-serif; background: radial-gradient(ellipse at top, #1a1d2b 0%, var(--bg-base) 80%); color: var(--text-main); margin: 0; padding: 30px 20px; display: flex; justify-content: center; min-height: 100vh; }
  .container { width: 100%; max-width: 1000px; }
  .text-metallic { background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0px 2px 10px rgba(197, 155, 39, 0.2); }
  .input-section { background: linear-gradient(145deg, var(--bg-card), #10121a); padding: 35px; border-radius: 16px; border: 1px solid var(--border-light); box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05); margin-bottom: 30px; position: relative; }
  .brand-title { margin-top: 0; font-size: 26px; font-weight: 800; letter-spacing: 1px; border-bottom: 1px solid var(--border-metal); padding-bottom: 20px; margin-bottom: 25px; }
  .brand-subtitle { display: block; font-size: 15px; color: var(--text-muted); font-weight: normal; letter-spacing: 2px; margin-top: 8px; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 18px; margin-bottom: 25px; }
  .form-group { display: flex; flex-direction: column; }
  .form-group label { margin-bottom: 8px; font-size: 13px; color: var(--gold-solid); font-weight: bold; letter-spacing: 0.5px;}
  .form-group input, .form-group select { padding: 14px; background-color: var(--bg-input); border: 1px solid var(--border-metal); color: var(--text-main); border-radius: 8px; font-size: 15px; }
  .btn-admin-toggle { position: absolute; top: 35px; right: 35px; background: none; border: 1px solid var(--border-metal); color: var(--text-muted); padding: 8px 15px; border-radius: 6px; cursor: pointer; }
  .btn-generate { width: 100%; padding: 18px; background: var(--gold-gradient); color: #1a1500; border: none; border-radius: 8px; font-size: 18px; font-weight: 900; cursor: pointer; }
  .admin-panel { display: none; background: #0c0d12; border: 1px solid #991b1b; border-radius: 12px; padding: 25px; margin-bottom: 30px; }
  .admin-subtitle { color: var(--gold-solid); font-size: 16px; margin-bottom: 10px; border-left: 4px solid var(--gold-solid); padding-left: 10px; margin-top: 25px; font-weight: bold;}
  .price-setting-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #13151d; padding: 20px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border-metal); }
  .btn-save-price { background: #059669; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; cursor: pointer; }
  .quote-result { display: none; background: linear-gradient(145deg, var(--bg-card), #10121a); padding: 50px; border-radius: 16px; border: 1px solid var(--border-light); }
  .plan-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
  .card { background: linear-gradient(145deg, #181a24, #12141c); border: 1px solid var(--border-metal); border-radius: 12px; padding: 30px; margin-bottom: 20px; }
  .card-title { font-size: 19px; font-weight: bold; margin-bottom: 20px; display: flex; justify-content: space-between; }
  .price { font-size: 26px; color: var(--gold-solid); font-weight: 900; }
  .btn-print { background: #1e293b; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; position: absolute; right: 50px; top: 50px; }
</style>
</head>
<body>
<div class="container">
  <div class="input-section">
    <h1 class="brand-title text-metallic">ZERO職人鍍膜_XPEL竹北授權店 <span class="brand-subtitle">全方位車體防護 智慧報價系統</span></h1>
    <button type="button" class="btn-admin-toggle" onclick="toggleAdmin()">⚙️ 後台價格設定</button>
    <div class="form-grid">
      <div class="form-group"><label>車主稱呼</label><input type="text" id="cust-name"></div>
      <div class="form-group"><label>車型級距</label><select id="car-class" onchange="checkAutoQuote()"><option value="medium">中型車款</option><option value="large">大型車款</option><option value="special">特殊車款</option><option value="commercial">商務車款</option><option value="pickup">皮卡車款</option></select></div>
      <div class="form-group"><label>年份</label><input type="text" id="car-year" list="year-list" oninput="checkAutoQuote()"><datalist id="year-list"></datalist></div>
      <div class="form-group"><label>廠牌</label><input type="text" id="car-brand" list="brand-list" oninput="updateModelOptions(); checkAutoQuote();"><datalist id="brand-list"></datalist></div>
      <div class="form-group"><label>車款</label><input type="text" id="car-model" list="model-list" oninput="checkAutoQuote()"><datalist id="model-list"></datalist></div>
    </div>
    <button type="button" class="btn-generate" onclick="generateQuote()">立即產生尊榮報價單</button>
  </div>
  <div class="admin-panel" id="admin-panel">
    <h3>⚙️ 專屬車款價格自訂後台</h3>
    <div style="background: #1e293b; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid var(--border-metal);">
      <label style="color:var(--gold-solid); font-weight:bold; display:block; margin-bottom:12px;">💾 資料備份與還原工具：</label>
      <div style="display: flex; gap: 10px;"><button type="button" onclick="exportData()" style="padding: 10px; background: #475569; border: none; color: white; border-radius: 4px; cursor: pointer; flex: 1;">備份報價資料</button><button type="button" onclick="importData()" style="padding: 10px; background: #059669; border: none; color: white; border-radius: 4px; cursor: pointer; flex: 1;">還原報價資料</button></div>
    </div>
    <div class="admin-grid"><input type="text" id="adm-year" placeholder="年份"><input type="text" id="adm-brand" placeholder="廠牌"><input type="text" id="adm-model" placeholder="車款"></div>
    <div class="price-setting-grid">
        <div class="form-group"><label>A-LUX MAX</label><input type="number" id="p-a1"></div><div class="form-group"><label>A-LUX MATTE</label><input type="number" id="p-a2"></div><div class="form-group"><label>B-EXO ARMOR</label><input type="number" id="p-b1"></div><div class="form-group"><label>B-LUX PLUS</label><input type="number" id="p-b2"></div>
        <div class="form-group"><label>C-PROTEX LITE</label><input type="number" id="p-c1"></div><div class="form-group"><label>C-LITE 消光</label><input type="number" id="p-c2"></div>
    </div>
    <button type="button" class="btn-save-price" onclick="saveCustomPrice()">💾 儲存此車款專屬價格</button>
  </div>
  <div class="quote-result" id="quote-area">
    <button type="button" class="btn-print" onclick="window.print()">🖨️ 列印</button>
    <div class="quote-header"><h2 id="main-title">ZERO職人｜專屬報價一覽</h2><div id="display-car-info"></div></div>
    <div id="wrap-section"></div>
  </div>
</div>
<script>
  let customDatabase = JSON.parse(localStorage.getItem('zero_all_prices_v2')) || {};
  const classPrices = {
    medium: { w1: 700, w2: 1200, w3: 1800, w4: 1800, w5: 3000, g1: 4000, g2: 8000, g3: 10000, g4: 12000, c_1: 15000, c_2: 26000, c_3: 42000 },
    large: { w1: 800, w2: 1500, w3: 2100, w4: 2100, w5: 3600, g1: 4000, g2: 8000, g3: 10000, g4: 12000, c_1: 16500, c_2: 28000, c_3: 43000 },
    special: { w1: 1000, w2: 1800, w3: 2500, w4: 2500, w5: 4000, g1: 4000, g2: 8000, g3: 10000, g4: 12000, c_1: 18000, c_2: 30000, c_3: 45000 },
    commercial: { w1: 1300, w2: 2000, w3: 3000, w4: 3000, w5: 5000, g1: 4000, g2: 8000, g3: 10000, g4: 12000, c_1: 21000, c_2: 33000, c_3: 48000 },
    pickup: { w1: 1300, w2: 2000, w3: 5000, w4: 5000, w5: 8000, g1: 4000, g2: 8000, g3: 10000, g4: 12000, c_1: 25000, c_2: 37000, c_3: 53000 }
  };
  function toggleAdmin() {
    const adminPassword = "0000"; // ★ 在這裡修改密碼 ★
    const input = prompt("請輸入管理員密碼：");
    if (input === adminPassword) {
        const panel = document.getElementById('admin-panel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    } else if (input !== null) { alert("密碼錯誤，拒絕進入！"); }
  }
  function exportData() {
      const data = localStorage.getItem('zero_all_prices_v2');
      if (!data) return alert("沒有資料！");
      const textarea = document.createElement("textarea"); textarea.value = data; document.body.appendChild(textarea); textarea.select(); document.execCommand("copy"); document.body.removeChild(textarea); alert("報價資料已複製！");
  }
  function importData() {
      const data = prompt("貼上備份代碼:");
      if (data) { try { JSON.parse(data); localStorage.setItem('zero_all_prices_v2', data); location.reload(); } catch (e) { alert("格式錯誤！"); } }
  }
  function saveCustomPrice() {
    const y = document.getElementById('adm-year').value.trim(); const b = document.getElementById('adm-brand').value.trim(); const m = document.getElementById('adm-model').value.trim();
    if(!y || !b || !m) return alert('請填寫完整資訊！');
    const key = `${y}|${b}|${m}`; const data = {};
    ['a1','a2','b1','b2','c1','c2','w1','w2','w3','w4','w5','g1','g2','g3','g4','c_1','c_2','c_3'].forEach(k => { data[k] = document.getElementById('p-' + k).value || null; });
    customDatabase[key] = data; localStorage.setItem('zero_all_prices_v2', JSON.stringify(customDatabase)); alert('✅ 已儲存！');
  }
  function generateQuote() {
    const cls = document.getElementById('car-class').value;
    const basePrices = classPrices[cls];
    const y = document.getElementById('car-year').value.trim();
    const b = document.getElementById('car-brand').value.trim();
    const m = document.getElementById('car-model').value.trim();
    const key = `${y}|${b}|${m}`;
    const p = customDatabase[key] || basePrices;
    document.getElementById('quote-area').style.display = 'block';
    ['a1','a2','b1','b2','c1','c2','w1','w2','w3','w4','w5','g1','g2','g3','g4','c_1','c_2','c_3'].forEach(k => {
        const el = document.getElementById('v-'+k);
        if(el) el.innerText = p[k] ? 'NT$' + parseInt(p[k]).toLocaleString() : '需評估';
    });
  }
  function checkAutoQuote() {}
  function updateModelOptions() {}
  function initData() {
    const yearList = document.getElementById('year-list');
    const currentYear = new Date().getFullYear();
    for(let y = currentYear + 1; y >= currentYear - 15; y--) { yearList.innerHTML += `<option value="${y}"></option>`; }
  }
  initData();
</script>
</body>
</html>
