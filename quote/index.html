<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZERO職人鍍膜_XPEL竹北授權店 | 智慧報價系統</title>
<style>
  :root {
    /* 曜石黑底色系 */
    --bg-base: #0a0b10;
    --bg-card: #151720;
    --bg-input: #0f1118;
    
    /* 金屬光澤漸層 (黃金/香檳金) */
    --gold-gradient: linear-gradient(135deg, #c59b27 0%, #fcf6ba 40%, #c59b27 80%, #aa771c 100%);
    --gold-solid: #d4af37;
    --gold-dim: rgba(212, 175, 55, 0.15);

    /* VIP 專屬橘色系 (琥珀橘/愛馬仕橘) */
    --vip-gradient: linear-gradient(135deg, #ea580c 0%, #fb923c 50%, #ea580c 100%);
    --vip-solid: #f97316;
    
    /* 文字與边框 */
    --text-main: #f1f5f9;
    --text-muted: #94a3b8;
    --border-metal: #2a2d3d;
    --border-light: rgba(255, 255, 255, 0.08);
    --success: #10b981;
  }

  body { 
    font-family: 'Helvetica Neue', 'Segoe UI', Tahoma, Geneva, sans-serif; 
    background: radial-gradient(ellipse at top, #1a1d2b 0%, var(--bg-base) 80%);
    color: var(--text-main); 
    margin: 0; 
    padding: 30px 20px; 
    display: flex; 
    justify-content: center; 
    min-height: 100vh;
  }
  .container { width: 100%; max-width: 1000px; }

  /* --- 金屬文字特效 --- */
  .text-metallic {
    background: var(--gold-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0px 2px 10px rgba(197, 155, 39, 0.2);
  }

  /* --- 頂部輸入區 --- */
  .input-section { 
    background: linear-gradient(145deg, var(--bg-card), #10121a);
    padding: 35px; 
    border-radius: 16px; 
    border: 1px solid var(--border-light);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    margin-bottom: 30px; 
    position: relative; 
  }
  
  .brand-title {
    margin-top: 0; 
    font-size: 26px; 
    font-weight: 800;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border-metal); 
    padding-bottom: 20px;
    margin-bottom: 25px;
  }
  .brand-subtitle {
    display: block;
    font-size: 15px;
    color: var(--text-muted);
    font-weight: normal;
    letter-spacing: 2px;
    margin-top: 8px;
    -webkit-text-fill-color: var(--text-muted);
  }

  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 18px; margin-bottom: 25px; }
  .form-group { display: flex; flex-direction: column; }
  .form-group label { margin-bottom: 8px; font-size: 13px; color: var(--gold-solid); font-weight: bold; letter-spacing: 0.5px;}
  .form-group input, .form-group select { 
    padding: 14px; 
    background-color: var(--bg-input); 
    border: 1px solid var(--border-metal); 
    color: var(--text-main); 
    border-radius: 8px; 
    font-size: 15px; 
    outline: none; 
    color-scheme: dark;
    transition: all 0.3s;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
  }
  .form-group input:focus, .form-group select:focus { 
    border-color: var(--gold-solid); 
    box-shadow: 0 0 0 1px var(--gold-solid), inset 0 2px 4px rgba(0,0,0,0.5);
  }
  
  .btn-admin-toggle { 
    position: absolute; top: 35px; right: 35px; background: none; 
    border: 1px solid var(--border-metal); color: var(--text-muted); 
    padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 13px;
    transition: 0.3s;
  }
  .btn-admin-toggle:hover { border-color: var(--gold-solid); color: var(--gold-solid); background: var(--gold-dim); }

  /* 金屬按鈕 */
  .btn-generate {
    width: 100%; padding: 18px; 
    background: var(--gold-gradient);
    color: #1a1500; border: none; border-radius: 8px; 
    font-size: 18px; font-weight: 900; letter-spacing: 1px;
    cursor: pointer; transition: all 0.3s;
    box-shadow: 0 8px 20px rgba(197, 155, 39, 0.3), inset 0 1px 1px rgba(255,255,255,0.8);
  }
  .btn-generate:hover { filter: brightness(1.15); box-shadow: 0 10px 25px rgba(197, 155, 39, 0.4), inset 0 1px 1px rgba(255,255,255,0.9); transform: translateY(-1px); }

  /* --- 後台管理區 --- */
  .admin-panel { display: none; background: #0c0d12; border: 1px solid #991b1b; border-radius: 12px; padding: 25px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
  .admin-panel h3 { margin-top: 0; color: #f87171; border-bottom: 1px solid var(--border-metal); padding-bottom: 15px; }
  .admin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
  .admin-grid input { padding: 12px; background: var(--bg-input); color: white; border: 1px solid var(--border-metal); border-radius: 6px;}
  .admin-subtitle { color: var(--gold-solid); font-size: 16px; margin-bottom: 10px; border-left: 4px solid var(--gold-solid); padding-left: 10px; margin-top: 25px; font-weight: bold;}
  .price-setting-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #13151d; padding: 20px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border-metal); }
  .price-setting-grid input { padding: 12px; background: var(--bg-base); color: white; border: 1px solid var(--border-metal); border-radius: 6px; width: 100%; box-sizing: border-box;}
  .btn-save-price { background: #059669; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.2s;}
  .btn-save-price:hover { background: #047857; }

  /* --- 報價單展示區 --- */
  .quote-result { 
    display: none; 
    background: linear-gradient(145deg, var(--bg-card), #10121a); 
    padding: 50px; border-radius: 16px; 
    border: 1px solid var(--border-light);
    box-shadow: 0 20px 50px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
  }
  .quote-header { text-align: center; margin-bottom: 50px; }
  .quote-header h2 { font-size: 32px; margin: 0 0 20px 0; letter-spacing: 3px; font-weight: 800; }
  .car-info-display { 
    font-size: 20px; color: #fff; background: var(--gold-dim); 
    display: inline-block; padding: 12px 30px; border-radius: 50px; 
    border: 1px solid var(--gold-solid); font-weight: bold; letter-spacing: 1px;
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
  }
  .price-status-tag { display: block; font-size: 13px; color: var(--success); margin-top: 15px; }

  /* 方案排版 */
  .plan-category { margin-bottom: 50px; }
  .category-title { font-size: 24px; color: var(--gold-solid); border-left: 5px solid var(--gold-solid); padding-left: 15px; margin-bottom: 8px; font-weight: 900; letter-spacing: 1px;}
  .category-target { color: var(--text-muted); font-size: 15px; margin-bottom: 25px; padding-left: 20px; }
  .plan-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
  
  /* 立體金屬卡片 */
  .card { 
    background: linear-gradient(145deg, #181a24, #12141c); 
    border: 1px solid var(--border-metal); 
    border-radius: 12px; padding: 30px; 
    box-shadow: 5px 5px 15px #0a0b0f, -5px -5px 15px #1c1f2b;
    transition: 0.3s;
  }
  .card:hover { border-color: rgba(212, 175, 55, 0.4); box-shadow: 0 10px 20px rgba(0,0,0,0.8); }
  .card-title { font-size: 19px; font-weight: bold; color: var(--text-main); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-metal); padding-bottom: 15px;}
  .price { font-size: 26px; color: var(--gold-solid); font-weight: 900; font-family: 'Arial', sans-serif;}
  .card ul { list-style: none; padding: 0; margin: 0; }
  .card li { margin-bottom: 12px; font-size: 15px; color: #cbd5e1; display: flex; line-height: 1.5;}
  .card li.bullet::before { content: '❖'; color: var(--gold-solid); font-size: 12px; margin-right: 8px; margin-top: 3px;}
  
  /* 美容價目表 */
  .menu-item { display: flex; justify-content: space-between; align-items: center; width: 100%; border-bottom: 1px dashed var(--border-metal); padding-bottom: 12px; margin-bottom: 12px; }
  .menu-item span { font-weight: bold; color: var(--gold-solid); font-size: 18px; font-family: 'Arial', sans-serif;}
  .list-header { color: var(--text-main); font-weight: bold; margin-top: 20px; margin-bottom: 15px; font-size: 15px; text-align: center; background: var(--border-metal); padding: 8px; border-radius: 6px; letter-spacing: 1px;}
  .vip-header { background: var(--vip-gradient) !important; color: #fff !important; border: none !important; padding: 10px !important; }
  .vip-item span { color: var(--vip-solid) !important; }
  .glass-header { background: linear-gradient(135deg, #1e293b 0%, #334155 50%, #1e293b 100%) !important; color: var(--gold-solid) !important; border: 1px solid var(--gold-solid) !important; padding: 10px !important; }
  
  .footer-notes { margin-top: 50px; padding-top: 25px; border-top: 1px solid var(--border-metal); color: var(--text-muted); font-size: 14px; line-height: 1.8; text-align: center; }
  .btn-print { background: #1e293b; color: white; border: 1px solid var(--border-metal); padding: 10px 20px; border-radius: 8px; cursor: pointer; position: absolute; right: 50px; top: 50px; transition: 0.3s; }
  @media (max-width: 768px) { .plan-cards { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
  <div class="input-section">
    <h1 class="brand-title text-metallic">ZERO職人鍍膜_XPEL竹北授權店 <span class="brand-subtitle">全方位車體防護 智慧報價系統</span></h1>
    <button type="button" class="btn-admin-toggle" onclick="toggleAdmin()">⚙️ 後台價格設定</button>
    <div class="form-grid">
      <div class="form-group"><label>車主稱呼</label><input type="text" id="cust-name"></div>
      <div class="form-group"><label>車型級距</label><select id="car-class" onchange="checkAutoQuote()"><option value="medium">中型車款</option><option value="large">大型車款</option><option value="special">特殊車款</option><option value="commercial">商務車款</option><option value="pickup">皮卡車款</option></select></div>
      <div class="form-group"><label>出廠年份</label><input type="text" id="car-year" list="year-list" oninput="checkAutoQuote()"><datalist id="year-list"></datalist></div>
      <div class="form-group"><label>汽車廠牌</label><input type="text" id="car-brand" list="brand-list" oninput="updateModelOptions(); checkAutoQuote();"><datalist id="brand-list"></datalist></div>
      <div class="form-group"><label>車款型號</label><input type="text" id="car-model" list="model-list" oninput="checkAutoQuote()"><datalist id="model-list"></datalist></div>
    </div>
    <button type="button" class="btn-generate" onclick="generateQuote()">立即產生尊榮報價單</button>
  </div>

  <div class="admin-panel" id="admin-panel">
    <h3>⚙️ 專屬車款價格自訂後台</h3>
    <button type="button" onclick="exportData()" style="padding:10px; background:#475569; color:white; border:none; border-radius:4px;">備份報價資料</button>
  </div>

  <div class="quote-result" id="quote-area">
    <button type="button" class="btn-print" onclick="window.print()">🖨️ 列印 / 儲存 PDF</button>
    <div class="quote-header">
      <h2 id="main-title" class="text-metallic">ZERO職人｜專屬報價一覽</h2>
      <div class="car-info-display" id="display-car-info"></div>
      <div class="price-status-tag" id="price-status"></div>
    </div>

    <div class="plan-category" id="wrap-section">
      <div class="category-title">01 / 車體包膜方案</div>
      <div class="plan-cards">
        <div class="card"><div class="card-title">LUX MAX 終極防護 <span class="price" id="v-a1"></span></div><ul><li class="bullet">9.5mil 軍規等級｜10年保固</li></ul></div>
        <div class="card"><div class="card-title">LUX MATTE 特仕版 <span class="price" id="v-a2"></span></div><ul><li class="bullet">8–8.5mil 消光膜料｜10年保固</li></ul></div>
        <div class="card"><div class="card-title">EXO ARMOR 基礎防護 <span class="price" id="v-b1"></span></div><ul><li class="bullet">7.5mil 標準厚度｜7年保固</li></ul></div>
        <div class="card"><div class="card-title">LUX PLUS 熱銷強化 <span class="price" id="v-b2"></span></div><ul><li class="bullet">8–8.5mil 抗衝擊層｜10年保固</li></ul></div>
      </div>
    </div>

    <div class="plan-category" id="wash-section" style="margin-top: 50px;">
      <div class="category-title" id="wash-title">02 / 洗車美容與玻璃防護</div>
      <div class="plan-cards">
        <div class="card">
          <div class="card-title">常規保養服務</div>
          <ul>
            <li class="menu-item vip-item"><span>泡沫外觀清潔</span> <span id="v-w1"></span></li>
            <li class="menu-item"><span>鍍膜養護</span> <span id="v-w3"></span></li>
          </ul>
        </div>
        <div class="card">
          <div class="card-title">玻璃防護</div>
          <ul>
            <li class="menu-item"><span>前擋風玻璃</span> <span id="v-g1"></span></li>
            <li class="menu-item"><span>全車玻璃</span> <span id="v-g2"></span></li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // 核心資料庫
  const masterDatabase = {
    "2026|Tesla|MODEL Y":{"a1":150000,"a2":155000,"b1":105000,"b2":130000,"c1":90000,"c2":100000,"w1":800,"w2":1500,"w3":2100,"w4":2100,"w5":3600,"g1":4000,"g2":8000,"g3":10000,"g4":12000,"c_1":16500,"c_2":28000,"c_3":43000},
    "2026|Tesla|MODEL S":{"a1":166000,"a2":171000,"b1":121000,"b2":146000,"c1":106000,"c2":116000,"w1":800,"w2":1500,"w3":2100,"w4":2100,"w5":3600,"g1":4000,"g2":8000,"g3":10000,"g4":12000,"c_1":16500,"c_2":28000,"c_3":43000},
    "2026|Tesla|MODEL 3":{"a1":152000,"a2":157000,"b1":107000,"b2":132000,"c1":92000,"c2":102000,"w1":800,"w2":1500,"w3":2100,"w4":2100,"w5":3600,"g1":4000,"g2":8000,"g3":10000,"g4":12000,"c_1":16500,"c_2":28000,"c_3":43000},
    "2026|Tesla|MODEL X":{"a1":176000,"a2":181000,"b1":131000,"b2":156000,"c1":116000,"c2":126000,"w1":1000,"w2":1800,"w3":2500,"w4":2500,"w5":4000,"g1":4000,"g2":8000,"g3":10000,"g4":12000,"c_1":18000,"c_2":30000,"c_3":45000}
  };

  function toggleAdmin() {
    const password = "0000"; // ★ 在此修改密碼 ★
    const input = prompt("請輸入管理員密碼：");
    if (input === password) {
        const panel = document.getElementById('admin-panel');
        panel.style.display = (panel.style.display === 'block' ? 'none' : 'block');
    } else if (input !== null) { alert("密碼錯誤"); }
  }

  function generateQuote() {
    const y = document.getElementById('car-year').value.trim();
    const b = document.getElementById('car-brand').value.trim();
    const m = document.getElementById('car-model').value.trim();
    const key = `${y}|${b}|${m}`;
    const p = masterDatabase[key];
    if (!p) return alert("找不到此車款資料！");
    document.getElementById('quote-area').style.display = 'block';
    document.getElementById('display-car-info').innerText = `${y}年 ${b} ${m}`;
    ['a1','a2','b1','b2','w1','w2','w3','w4','w5','g1','g2','g3','g4','c_1','c_2','c_3'].forEach(k => {
        const el = document.getElementById('v-'+k);
        if(el) el.innerText = p[k] ? 'NT$' + parseInt(p[k]).toLocaleString() : '需評估';
    });
    document.getElementById('quote-area').scrollIntoView({ behavior: 'smooth' });
  }

  function initData() {
    const yearList = document.getElementById('year-list');
    const currentYear = new Date().getFullYear();
    for(let y = currentYear + 1; y >= currentYear - 15; y--) { yearList.innerHTML += `<option value="${y}"></option>`; }
  }
  
  function updateModelOptions() {}
  function checkAutoQuote() {}
  function exportData() {}
  function importData() {}
  function saveCustomPrice() {}
  initData();
</script>
</body>
</html>
